name: Update Stock Data

on:
  schedule:
    # 8 PM ET Sunday = Monday 00:00 UTC  (adjust as needed)
    - cron: '0 0 * * 1'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # scraping ~900 tickers takes ~30–45 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy lxml html5lib beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
