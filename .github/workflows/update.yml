name: Update Stock Data

# ─────────────────────────────────────────────────────────────────────────────
# Schedules
#   Weekly  — Sunday 11 PM ET (Monday 04:00 UTC)
#             Full scrape → grade → portfolio rebalance → publish
#   Daily   — Mon–Fri 9 PM ET (Tue–Sat 02:00 UTC)
#             Price refresh for held positions only (~30 seconds)
#
# Manual dispatch (Actions tab → Run workflow)
#   reset-only  ← USE THIS NOW — rebuilds portfolio from existing data.json,
#                 fetches retroactive price history, publishes. ~10 seconds.
#   reset       ← full scrape + grade + portfolio rebuild (~75 min)
#   weekly      ← full scrape + grade + rebalance (same as Sunday cron)
#   daily       ← price update only
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 4 * * 1'    # Weekly: Monday 04:00 UTC = Sunday 11 PM ET
    - cron: '0 2 * * 2-6'  # Daily:  Tue–Sat 02:00 UTC = Mon–Fri 9 PM ET

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'reset-only'
        type: choice
        options:
          - reset-only  # rebuild portfolio from existing data.json — no scrape (~10 sec)
          - reset       # full scrape + grade + portfolio rebuild (~75 min)
          - weekly      # full scrape + grade + rebalance
          - daily       # price update only

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-yfinance

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy lxml html5lib beautifulsoup4

      # ── 3. Determine run mode ─────────────────────────────────────────────────
      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "1" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # MODE: reset-only
      # Skips the scrape entirely — uses the existing data.json already in the
      # repo.  Runs reset_portfolio.py to rebuild the portfolio with retroactive
      # price history fetched from Yahoo Finance.  Takes ~10 seconds.
      # ─────────────────────────────────────────────────────────────────────────
      - name: "[reset-only] Rebuild portfolio from existing data.json"
        if: steps.mode.outputs.mode == 'reset-only'
        run: python reset_portfolio.py

      # ─────────────────────────────────────────────────────────────────────────
      # MODE: reset
      # Full scrape + grade + portfolio rebuild from scratch.  Use this when
      # you also want fresh fundamentals alongside the portfolio reset.
      # ─────────────────────────────────────────────────────────────────────────
      - name: "[reset] Scrape fresh fundamentals"
        if: steps.mode.outputs.mode == 'reset'
        run: python scraper.py

      - name: "[reset] Grade stocks"
        if: steps.mode.outputs.mode == 'reset'
        run: python grader.py

      - name: "[reset] Rebuild portfolio (top 25 picks, retroactive history)"
        if: steps.mode.outputs.mode == 'reset'
        run: python reset_portfolio.py

      # ─────────────────────────────────────────────────────────────────────────
      # MODE: weekly
      # ─────────────────────────────────────────────────────────────────────────
      - name: "[weekly] Scrape fresh fundamentals"
        if: steps.mode.outputs.mode == 'weekly'
        run: python scraper.py

      - name: "[weekly] Grade stocks + update portfolio"
        if: steps.mode.outputs.mode == 'weekly'
        run: python grader.py

      # ─────────────────────────────────────────────────────────────────────────
      # MODE: daily
      # ─────────────────────────────────────────────────────────────────────────
      - name: "[daily] Refresh holding prices"
        if: steps.mode.outputs.mode == 'daily'
        run: python price_updater.py

      # ── 4. Regenerate HTML (all modes) ───────────────────────────────────────
      - name: Generate index.html
        run: python generate_html.py

      # ── 5. Commit and push ───────────────────────────────────────────────────
      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MODE="${{ steps.mode.outputs.mode }}"
          DATE="$(date -u '+%Y-%m-%d')"

          if [ "$MODE" = "reset-only" ] || [ "$MODE" = "reset" ]; then
            git add data.json portfolio.json index.html
            git diff --cached --quiet || \
              git commit -m "reset: retroactive portfolio history ${DATE}"

          elif [ "$MODE" = "weekly" ]; then
            git add raw_data.json data.json portfolio.json index.html
            git diff --cached --quiet || \
              git commit -m "chore: weekly update ${DATE}"

          else
            git add portfolio.json index.html
            git diff --cached --quiet || \
              git commit -m "chore: daily prices ${DATE}"
          fi

          git push
