name: Update Stock Data

on:
  schedule:
    - cron: '0 0 * * 1'   # Monday midnight UTC (8 PM ET Sunday)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy lxml html5lib beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json portfolio.json index.html
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
